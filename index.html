<div style={{ display: 'flex', gap: '3px', flexWrap: 'wrap' }}>
{stable.unicorns.map((u, idx) => (
<Card
key={`${u.id}-${idx}`}
card={u}
size="mini"
onClick={() => setZoomedCard(u)}
draggable={true}
onDragStart={() => handleDragStart(u, { type: 'stable', player: player.name, section: 'unicorns' })}
className={draggedCard?.id === u.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{stable && stable.upgrades.length > 0 && (
<div style={{ marginBottom: '6px' }}>
<div style={{ fontSize: '0.7rem', color: '#666', marginBottom: '3px' }}>Ventajas:</div>
<div style={{ display: 'flex', gap: '3px', flexWrap: 'wrap' }}>
{stable.upgrades.map((u, idx) => (
<Card
key={`${u.id}-${idx}`}
card={u}
size="mini"
onClick={() => setZoomedCard(u)}
draggable={true}
onDragStart={() => handleDragStart(u, { type: 'stable', player: player.name, section: 'upgrades' })}
className={draggedCard?.id === u.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{stable && stable.downgrades.length > 0 && (
<div style={{ marginBottom: '6px' }}>
<div style={{ fontSize: '0.7rem', color: '#666', marginBottom: '3px' }}>Desventajas:</div>
<div style={{ display: 'flex', gap: '3px', flexWrap: 'wrap' }}>
{stable.downgrades.map((d, idx) => (
<Card
key={`${d.id}-${idx}`}
card={d}
size="mini"
onClick={() => setZoomedCard(d)}
draggable={true}
onDragStart={() => handleDragStart(d, { type: 'stable', player: player.name, section: 'downgrades' })}
className={draggedCard?.id === d.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{gameData.playerHands[player.name] && gameData.playerHands[player.name].length > 0 && (
<div
className={`drop-zone ${draggedCard && dragSource?.type === 'hand' ? 'drop-zone-active' : ''}`}
onDragOver={handleDragOver}
onDrop={(e) => handleDropOnOtherHand(e, player.name)}
style={{
marginTop: '8px',
padding: '6px',
background: 'rgba(255,255,255,0.5)',
borderRadius: '6px',
border: '2px dashed #999'
}}
>
<div style={{
fontSize: '0.7rem',
color: '#666',
marginBottom: '3px',
display: 'flex',
justifyContent: 'space-between',
alignItems: 'center'
}}>
<span>Mano ({gameData.playerHands[player.name].length}):</span>
<button
onClick={() => setExpandedPlayerHand(expandedPlayerHand === player.name ? null : player.name)}
style={{
padding: '2px 6px',
fontSize: '0.7rem',
background: '#667eea',
color: 'white',
border: 'none',
borderRadius: '4px',
cursor: 'pointer'
}}
>
{expandedPlayerHand === player.name ? '▼' : '▶'}
</button>
</div>
<div style={{
display: 'flex',
gap: '3px',
flexWrap: 'wrap',
maxHeight: expandedPlayerHand === player.name ? 'none' : '45px',
overflow: expandedPlayerHand === player.name ? 'visible' : 'hidden'
}}>
{/* Modificación para la carta 0022 - Camara para la niñera */}
{hasNannyCam(player.name) ? (
  // Si el jugador tiene la cámara de la niñera, mostrar las cartas reales
  gameData.playerHands[player.name].map((card, idx) => (
    <Card
      key={`hand-${player.name}-${idx}`}
      card={card}
      size="mini"
      onClick={() => setZoomedCard(card)}
      draggable={true}
      onDragStart={() => {
        setDraggedCard(card);
        setDragSource({ type: 'otherHand', player: player.name, index: idx });
      }}
      className={dragSource?.type === 'otherHand' && dragSource?.player === player.name && dragSource?.index === idx ? 'card-dragging' : ''}
    />
  ))
) : (
  // Si no tiene la cámara, mostrar dorsos
  gameData.playerHands[player.name].map((_, idx) => (
    <CardBack
      key={`hand-${player.name}-${idx}`}
      size="mini"
      draggable={true}
      onDragStart={() => {
        const card = gameData.playerHands[player.name][idx];
        setDraggedCard(card);
        setDragSource({ type: 'otherHand', player: player.name, index: idx });
      }}
      className={dragSource?.type === 'otherHand' && dragSource?.player === player.name && dragSource?.index === idx ? 'card-dragging' : ''}
    />
  ))
)}
</div>
</div>
)}
</div>
);
})}
</div>
</div>
{/* Tu establo */}
<div
className={`drop-zone ${draggedCard ? 'drop-zone-active' : ''}`}
onDragOver={handleDragOver}
onDrop={(e) => handleDropOnStable(e, playerName)}
style={{
background: 'rgba(255, 255, 255, 0.95)',
borderRadius: '12px',
padding: '15px',
border: '3px solid #667eea',
overflow: 'auto'
}}
>
<h3 style={{ marginBottom: '10px', color: '#667eea', fontSize: '1.1rem' }}>
🏰 TU ESTABLO
</h3>
<div style={{ display: 'flex', gap: '15px', flexWrap: 'wrap' }}>
{myStable && myStable.unicorns.length > 0 && (
<div style={{ flex: '1 1 300px' }}>
<h4 style={{ fontSize: '0.9rem', marginBottom: '8px', color: '#333' }}>
🦄 Unicornios ({myStable.unicorns.length}/{gameData.unicornsToWin}):
</h4>
<div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
{myStable.unicorns.map((u, idx) => (
<Card
key={`${u.id}-${idx}`}
card={u}
size="small"
onClick={() => setZoomedCard(u)}
draggable={true}
onDragStart={() => handleDragStart(u, { type: 'stable', player: playerName, section: 'unicorns' })}
className={draggedCard?.id === u.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{myStable && myStable.upgrades.length > 0 && (
<div style={{ flex: '1 1 200px' }}>
<h4 style={{ fontSize: '0.9rem', marginBottom: '8px', color: '#333' }}>
↑ Ventajas ({myStable.upgrades.length}):
</h4>
<div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
{myStable.upgrades.map((u, idx) => (
<Card
key={`${u.id}-${idx}`}
card={u}
size="small"
onClick={() => setZoomedCard(u)}
draggable={true}
onDragStart={() => handleDragStart(u, { type: 'stable', player: playerName, section: 'upgrades' })}
className={draggedCard?.id === u.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{myStable && myStable.downgrades.length > 0 && (
<div style={{ flex: '1 1 200px' }}>
<h4 style={{ fontSize: '0.9rem', marginBottom: '8px', color: '#333' }}>
↓ Desventajas ({myStable.downgrades.length}):
</h4>
<div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
{myStable.downgrades.map((d, idx) => (
<Card
key={`${d.id}-${idx}`}
card={d}
size="small"
onClick={() => setZoomedCard(d)}
draggable={true}
onDragStart={() => handleDragStart(d, { type: 'stable', player: playerName, section: 'downgrades' })}
className={draggedCard?.id === d.id ? 'card-dragging' : ''}
/>
))}
</div>
</div>
)}
{(!myStable || (myStable.unicorns.length === 0 && myStable.upgrades.length === 0 && myStable.downgrades.length === 0)) && (
<div style={{
width: '100%',
textAlign: 'center',
padding: '30px',
color: '#999'
}}>
Arrastra cartas aquí
</div>
)}
</div>
</div>
{/* Tu mano */}
<div
className={`drop-zone ${draggedCard && dragSource?.type !== 'hand' ? 'drop-zone-active' : ''}`}
onDragOver={handleDragOver}
onDrop={handleDropOnHand}
style={{
background: 'rgba(255, 255, 255, 0.95)',
borderRadius: '12px',
padding: '15px',
border: '3px solid #27ae60'
}}
>
<div style={{
display: 'flex',
justifyContent: 'space-between',
alignItems: 'center',
marginBottom: '10px'
}}>
<h3 style={{ color: '#27ae60', fontSize: '1.1rem' }}>
✋ TU MANO ({myHand.length}/7)
</h3>
<button
onClick={handleEndTurn}
disabled={!isMyTurn}
style={{
padding: '10px 20px',
fontSize: '1rem',
fontWeight: 'bold',
background: isMyTurn ? 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)' : '#ccc',
color: 'white',
border: 'none',
borderRadius: '8px',
cursor: isMyTurn ? 'pointer' : 'not-allowed'
}}
>
{isMyTurn ? '⏭️ Terminar Turno' : '⏳ Espera'}
</button>
</div>
{myHand.length > 0 ? (
<div style={{
display: 'flex',
gap: '10px',
flexWrap: 'wrap',
justifyContent: 'center'
}}>
{myHand.map((card, index) => (
<div key={`${card.id}-${index}`} style={{ position: 'relative' }}>
<Card
card={card}
draggable={true}
onDragStart={() => handleDragStart(card, { type: 'hand' })}
className={draggedCard?.id === card.id ? 'card-dragging' : ''}
onClick={() => setZoomedCard(card)}
/>
{/* Botones para cartas especiales */}
{isMyTurn && (card.filename === '0046' || card.filename === '0050') && (
  <button
    onClick={(e) => {
      e.stopPropagation();
      if (card.filename === '0046') handleUseRoboDescarado();
      if (card.filename === '0050') handleUseTratoInjusto();
    }}
    style={{
      position: 'absolute',
      bottom: '5px',
      left: '50%',
      transform: 'translateX(-50%)',
      padding: '3px 10px',
      fontSize: '0.6rem',
      background: '#e74c3c',
      color: 'white',
      border: 'none',
      borderRadius: '15px',
      cursor: 'pointer',
      zIndex: 10,
      whiteSpace: 'nowrap'
    }}
  >
    Usar
  </button>
)}
</div>
))}
</div>
) : (
<div style={{
textAlign: 'center',
padding: '20px',
color: '#999'
}}>
Sin cartas
</div>
)}
</div>
</div>
</div>
);
}
ReactDOM.render(<UnstableUnicornsGame />, document.getElementById('root'));
</script>
</body>
</html>
